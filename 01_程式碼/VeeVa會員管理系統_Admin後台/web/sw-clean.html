<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-store">
  <title>更新 VeeVa Admin</title>
  <style>
    :root {
      color: #10251e;
      background: #f5f7f6;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      align-items: center;
      display: flex;
      justify-content: center;
      margin: 0;
      min-height: 100vh;
    }

    main {
      background: #ffffff;
      border: 1px solid #dfe7e2;
      border-radius: 8px;
      box-sizing: border-box;
      max-width: 420px;
      padding: 28px;
      width: calc(100% - 32px);
    }

    h1 {
      font-size: 22px;
      line-height: 1.35;
      margin: 0 0 12px;
    }

    p {
      color: #50645b;
      font-size: 15px;
      line-height: 1.7;
      margin: 0;
    }

    button {
      appearance: none;
      background: #20755f;
      border: 0;
      border-radius: 6px;
      color: #ffffff;
      cursor: pointer;
      font: inherit;
      margin-top: 20px;
      min-height: 44px;
      padding: 0 18px;
      width: 100%;
    }
  </style>
</head>
<body>
  <main>
    <h1>正在更新後台</h1>
    <p id="status">正在清除舊版快取，完成後會自動回到活動管理。</p>
    <button id="retry" type="button" hidden>重新進入後台</button>
  </main>

  <script>
    (function () {
      var fallbackPath = '/?adminTab=activities&v=activity-cache-clean1';
      var next = new URLSearchParams(window.location.search).get('next') || fallbackPath;
      var status = document.getElementById('status');
      var retry = document.getElementById('retry');

      function goDone() {
        window.location.replace(
          '/sw-clean-done.html?next=' + encodeURIComponent(next) +
          '&cacheCleaned=' + Date.now(),
        );
      }

      async function clean() {
        try {
          if ('serviceWorker' in navigator) {
            var registrations = await navigator.serviceWorker.getRegistrations();
            await Promise.all(registrations.map(function (registration) {
              if (registration.update) {
                return registration.update().catch(function () {});
              }
              return Promise.resolve();
            }));
            await new Promise(function (resolve) {
              setTimeout(resolve, 1200);
            });
            await Promise.all(registrations.map(function (registration) {
              return registration.unregister();
            }));
          }

          if ('caches' in window) {
            var keys = await caches.keys();
            await Promise.all(keys.map(function (key) {
              return caches.delete(key);
            }));
          }

          status.textContent = '更新完成，正在重新進入後台。';
          setTimeout(goDone, 800);
        } catch (error) {
          status.textContent = '快取清除尚未完成，請再試一次。';
          retry.hidden = false;
        }
      }

      retry.addEventListener('click', clean);
      clean();
    }());
  </script>
</body>
</html>
