<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="veeva_member_app">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>veeva_member_app</title>
  <link rel="manifest" href="manifest.json">
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: #f7f8f4;
      overflow: hidden;
      overscroll-behavior: none;
      -webkit-font-smoothing: antialiased;
      -webkit-text-size-adjust: 100%;
    }

    * {
      -webkit-tap-highlight-color: transparent;
    }

    flt-glass-pane,
    flutter-view {
      background: #f7f8f4 !important;
    }
  </style>
</head>
<body>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script>
    (function () {
      var liffId = '2010298394-7PwRtpTY';
      var bootVersion = 'survey-complete1';
      var didBootFlutter = false;

      function bootFlutter() {
        if (didBootFlutter) {
          return;
        }
        didBootFlutter = true;
        var script = document.createElement('script');
        script.src = '/flutter_bootstrap.js?v=' + bootVersion;
        script.defer = true;
        document.body.appendChild(script);
      }

      function initLiffBeforeFlutter() {
        if (!window.liff || !window.liff.init) {
          window.veevaLiffInitError = 'LIFF SDK unavailable';
          return Promise.resolve();
        }
        return window.liff
          .init({
            liffId: liffId,
            withLoginOnExternalBrowser: false
          })
          .catch(function (error) {
            window.veevaLiffInitError =
              error && error.message ? error.message : String(error);
          });
      }

      window.veevaLiffReady = initLiffBeforeFlutter();
      Promise
        .race([
          window.veevaLiffReady,
          new Promise(function (resolve) {
            window.setTimeout(resolve, 8000);
          })
        ])
        .then(bootFlutter, bootFlutter);
    })();
  </script>
</body>
</html>
